<body>
    <div id="rocket-header"></div>

    <main>
        <div class="tool-container">

            <h1>Extract PDF Pages</h1>
            <p class="desc">Select and separate specific pages from your PDF into a new document. High quality, instant,
                and secure.</p>

            <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon-small">
                    <i class="fas fa-file-pdf"></i>
                </div>

                <p style="color: #64748b; margin-top: 0.5rem;">Supported format: PDF</p>
                <button class="btn-select">
                    <i class="fas fa-upload"></i> Select PDF File
                </button>
                <input type="file" id="fileInput" accept=".pdf" style="display: none;">
            </div>

            <div class="feature-tags">
                <div class="feature-tag">

                    <span>Merge or Separate</span>
                </div>

                    <i class="fas fa-bolt"></i>
                    <span>Fast Processing</span>
                </div>
                <div class="feature-tag">
                    <i class="fas fa-gift"></i>
                    <span>100% Free</span>
                </div>
            </div>

            <div class="process-section" id="processSection">
                <div class="controls-toolbar">
                    <div class="control-group">
                        <button class="btn-sm" onclick="selectAll()">
                            <i class="fas fa-check-double"></i> Select All
                        </button>
                        <button class="btn-sm" onclick="deselectAll()">
                            <i class="fas fa-times"></i> Deselect All
                        </button>
                        <button class="btn-sm" onclick="invertSelection()">
                            <i class="fas fa-random"></i> Invert
                        </button>
                    </div>
                    <div class="control-group">
                        <span class="control-label">Range:</span>
                        <input type="text" id="rangeInput" class="input-text" placeholder="e.g. 1-5, 8, 10">
                        <button class="btn-sm"
                            style="background:var(--primary); color:white; border-color:var(--primary);"
                            onclick="applyRange()">Apply</button>
                    </div>
                </div>

                <div class="pages-grid" id="pagesGrid"></div>

                <div class="action-area">
                    <div class="radio-options">
                        <label class="radio-label active" onclick="selectMode(this)">
                            <input type="radio" name="outputMode" value="merge" class="radio-input" checked>
                            <i class="fas fa-file-pdf"></i>
                            <span>Merge into one PDF</span>
                        </label>
                        <label class="radio-label" onclick="selectMode(this)">
                            <input type="radio" name="outputMode" value="separate" class="radio-input">
                            <i class="fas fa-file-archive"></i>
                            <span>Separate PDF files (ZIP)</span>
                        </label>
                    </div>

                    <button class="action-btn" id="extractBtn">
                        <i class="fas fa-download"></i> Extract Selected Pages
                    </button>

                    <div class="status-msg" id="statusMsg"></div>

    <div id="rocket-footer"></div>

    <script>
        const { PDFDocument } = PDFLib;
        let fileArrayBuffer = null;
        let selectedPages = new Set();
        let totalPages = 0;
        let originalFileName = 'document';

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const processSection = document.getElementById('processSection');
        const pagesGrid = document.getElementById('pagesGrid');
        const extractBtn = document.getElementById('extractBtn');
        const statusMsg = document.getElementById('statusMsg');
        const rangeInput = document.getElementById('rangeInput');

        // Styles for radio buttons
        window.selectMode = function (label) {
            document.querySelectorAll('.radio-label').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.radio-input').forEach(i => i.checked = false);
            label.classList.add('active');
            label.querySelector('input').checked = true;
        }

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
            dropZone.style.background = 'rgba(16, 185, 129, 0.05)';
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.background = 'linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%)';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.background = 'linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%)';
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (file.type !== 'application/pdf') {
                showStatus('Please upload a valid PDF file.', 'error');
                return;
            }

            originalFileName = file.name.replace('.pdf', '');
            dropZone.style.display = 'none';
            document.querySelector('.feature-tags').style.display = 'none';
            processSection.style.display = 'block';
            pagesGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;"><i class="fas fa-spinner fa-spin fa-2x" style="color: var(--primary);"></i><p style="margin-top:1rem; color:var(--text-light);">Loading PDF...</p></div>';
            statusMsg.style.display = 'none';
            selectedPages.clear();

            try {
                // Store buffer safely
                fileArrayBuffer = await file.arrayBuffer();

                // Render thumbnails using PDF.js with cloned buffer
                // Clone buffer to prevent detachment issues
                const pdf = await pdfjsLib.getDocument(fileArrayBuffer.slice(0)).promise;
                totalPages = pdf.numPages;

                pagesGrid.innerHTML = '';

                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 0.3 });

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;

                    const imgData = canvas.toDataURL();

                    const item = document.createElement('div');
                    item.className = 'page-item';
                    item.dataset.pageIndex = i - 1; // 0-based index
                    item.innerHTML = `
                    <img src="${imgData}" class="page-thumb">
                    <div class="page-number">Page ${i}</div>
                `;
                    item.onclick = () => togglePage(item, i - 1);
                    pagesGrid.appendChild(item);
                }

                showStatus(`Loaded ${totalPages} pages. Select pages to extract.`, 'success');
                setTimeout(() => statusMsg.style.display = 'none', 3000);

            } catch (error) {
                console.error(error);
                showStatus('Error loading PDF: ' + error.message, 'error');
            }
        }

        window.togglePage = function (element, index) {
            if (selectedPages.has(index)) {
                selectedPages.delete(index);
                element.classList.remove('selected');
            } else {
                selectedPages.add(index);
                element.classList.add('selected');
            }
            updateRangeInputFromSelection();
            updateExtractButton();
        }

        window.selectAll = function () {
            selectedPages.clear();
            const items = document.querySelectorAll('.page-item');
            items.forEach((item, index) => {
                selectedPages.add(index);
                item.classList.add('selected');
            });
            updateRangeInputFromSelection();
            updateExtractButton();
        }

        window.deselectAll = function () {
            selectedPages.clear();
            const items = document.querySelectorAll('.page-item');
            items.forEach(item => {
                item.classList.remove('selected');
            });
            updateRangeInputFromSelection();
            updateExtractButton();
        }

        window.invertSelection = function () {
            const items = document.querySelectorAll('.page-item');
            items.forEach((item, index) => {
                if (selectedPages.has(index)) {
                    selectedPages.delete(index);
                    item.classList.remove('selected');
                } else {
                    selectedPages.add(index);
                    item.classList.add('selected');
                }
            });
            updateRangeInputFromSelection();
            updateExtractButton();
        }

        window.applyRange = function () {
            const rangeStr = rangeInput.value;
            const newSelection = new Set();
            const parts = rangeStr.split(',');

            parts.forEach(part => {
                part = part.trim();
                if (part.includes('-')) {
                    const [start, end] = part.split('-').map(Number);
                    if (!isNaN(start) && !isNaN(end)) {
                        for (let i = start; i <= end; i++) {
                            if (i >= 1 && i <= totalPages) newSelection.add(i - 1);
                        }
                    }
                } else {
                    const page = Number(part);
                    if (!isNaN(page) && page >= 1 && page <= totalPages) {
                        newSelection.add(page - 1);
                    }
                }
            });

            selectedPages = newSelection;

            // Update UI
            const items = document.querySelectorAll('.page-item');
            items.forEach((item, index) => {
                if (selectedPages.has(index)) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
            updateExtractButton();
        }

        function updateRangeInputFromSelection() {
            const pages = Array.from(selectedPages).sort((a, b) => a - b).map(p => p + 1);
            if (pages.length > 0) {
                if (pages.length > 20) {
                    rangeInput.value = pages.length + " pages selected";
                } else {
                    rangeInput.value = pages.join(', ');
                }
            } else {
                rangeInput.value = '';
            }
        }

        function updateExtractButton() {
            if (selectedPages.size > 0) {
                extractBtn.innerHTML = `<i class="fas fa-download"></i> Extract ${selectedPages.size} Page${selectedPages.size > 1 ? 's' : ''}`;
            } else {
                extractBtn.innerHTML = `<i class="fas fa-download"></i> Extract Selected Pages`;
            }
        }

        function showStatus(message, type) {
            statusMsg.textContent = message;
            statusMsg.className = `status-msg ${type}`;
            statusMsg.style.display = 'block';
        }

        extractBtn.addEventListener('click', async () => {
            if (selectedPages.size === 0) {
                showStatus('Please select at least one page to extract.', 'error');
                return;
            }

            extractBtn.disabled = true;
            extractBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            showStatus('Processing...', 'success');

            try {
                const mode = document.querySelector('input[name="outputMode"]:checked').value;
                const sortedIndices = Array.from(selectedPages).sort((a, b) => a - b);

                // Load source doc from fresh buffer
                const pdfDocSrc = await PDFDocument.load(fileArrayBuffer.slice(0));

                if (mode === 'merge') {
                    // Create one PDF with selected pages
                    const newPdf = await PDFDocument.create();
                    const copiedPages = await newPdf.copyPages(pdfDocSrc, sortedIndices);
                    copiedPages.forEach(p => newPdf.addPage(p));

                    const pdfBytes = await newPdf.save();
                    download(pdfBytes, `${originalFileName}_extracted.pdf`, 'application/pdf');
                } else {
                    // Separate files -> ZIP
                    const zip = new JSZip();

                    for (const index of sortedIndices) {
                        const singlePdf = await PDFDocument.create();
                        const [copiedPage] = await singlePdf.copyPages(pdfDocSrc, [index]);
                        singlePdf.addPage(copiedPage);
                        const bytes = await singlePdf.save();
                        zip.file(`${originalFileName}_page_${index + 1}.pdf`, bytes);
                    }

                    const zipContent = await zip.generateAsync({ type: "blob" });
                    saveAs(zipContent, `${originalFileName}_pages.zip`);
                }

                showStatus('Success! Download started.', 'success');
                extractBtn.innerHTML = '<i class="fas fa-check"></i> Extracted';
                setTimeout(() => {
                    extractBtn.disabled = false;
                    updateExtractButton();
                }, 3000);

            } catch (error) {
                console.error(error);
                showStatus('Error processing PDF: ' + error.message, 'error');
                extractBtn.disabled = false;
                updateExtractButton();
            }
        });
    </script>
</body>

</html>
