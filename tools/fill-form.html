    <style>
        :root {

            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);

            --sidebar-width: 250px;

        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            padding-top: 80px;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(67, 97, 238, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gradientShift {

            0%,
            100% {

            }

            50% {
                transform: translate(10%, 10%) rotate(180deg);
            }

        /* Landing/Tool Container */

        /* Similar to other tools */

            border: 3px dashed var(--border);
            border-radius: 1.5rem;
            padding: 5rem 2rem;
            cursor: pointer;

            box-shadow: var(--shadow-lg);

        .upload-box:hover {

        .btn-select {

            border-radius: 50px;

            font-size: 1.1rem;
            margin-top: 1.5rem;

            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.3);

            align-items: center;

        .btn-select:hover {
            transform: translateY(-2px);

        }

        /* EDITOR UI (Initially Hidden) */
        #editor-ui {
            display: none;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #f8fafc;

        .editor-header {

            background: white;

            display: flex;
            align-items: center;

        .sidebar {

        .props-bar {

        input[type="color"] {

        .canvas-container-wrapper {
            flex: 1;

        .canvas-content {

        .page-nav {

            bottom: 2rem;

        .zoom-controls {

        .zoom-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;

            height: 24px;

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;

        .modal {

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .tool-group span {
                display: none;

        }
    </style>

    <!-- Processing Modal -->
    <div class="modal-overlay" id="loadingModal">
        <div class="modal">
            <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary); margin-bottom: 1rem;"></i>
            <h3 id="loadingText">Processing...</h3>
        </div>
    </div>

    <script>
        // Global State
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        let pdfDoc = null;
        let pdfBytes = null;
        let totalPages = 0;
        let currentPage = 1;
        let canvas = null;
        let fabricPages = {};
        let currentScale = 1.5;

        document.addEventListener('DOMContentLoaded', () => {
            initCanvas();
            setupEvents();

            // Setup Image Input
            document.getElementById('imgInput').addEventListener('change', handleImageUpload);
        });

        function initCanvas() {
            canvas = new fabric.Canvas('c', {
                preserveObjectStacking: true,
                selection: true,
                fireRightClick: true
            });

            // Brush settings for signature
            canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
            canvas.freeDrawingBrush.width = 3;
            canvas.freeDrawingBrush.color = "black";

            canvas.on('selection:created', updatePropsBar);
            canvas.on('selection:updated', updatePropsBar);
            canvas.on('selection:cleared', () => {
                document.getElementById('propsBar').style.visibility = 'hidden';
            });

            canvas.on('object:modified', savePageState);
            canvas.on('object:added', savePageState);
            canvas.on('object:removed', savePageState);
            canvas.on('path:created', savePageState); // For drawing
        }

        function setupEvents() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            dropZone.addEventListener('dragover', e => {
                e.preventDefault();
                dropZone.style.borderColor = 'var(--primary)';
                dropZone.style.background = '#f0f9ff';
            });

            dropZone.addEventListener('dragleave', e => {
                e.preventDefault();
                dropZone.style.borderColor = 'var(--border)';
                dropZone.style.background = 'rgba(255,255,255,0.9)';
            });

            dropZone.addEventListener('drop', e => {
                e.preventDefault();
                if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
            });

            fileInput.addEventListener('change', e => {
                if (e.target.files.length) handleFile(e.target.files[0]);
            });
        }

        async function handleFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Please upload a valid PDF file.');
                return;
            }

            showLoading('Loading PDF...');
            try {
                pdfBytes = await file.arrayBuffer();

                const loadingTask = pdfjsLib.getDocument(pdfBytes.slice(0));
                const pdf = await loadingTask.promise;
                totalPages = pdf.numPages;

                fabricPages = {};
                for (let i = 1; i <= totalPages; i++) fabricPages[i] = { objects: [] };

                // Switch UI (Safe Check)
                const landing = document.getElementById('landing-ui');
                if (landing) landing.style.display = 'none';

                // Hide standard header and footer
                const footerEl = document.querySelector('footer') || document.getElementById('rocket-footer');
                if (footerEl) footerEl.style.display = 'none';

                const headerEl = document.querySelector('header') || document.getElementById('rocket-header');
                if (headerEl) headerEl.style.display = 'none';

                document.getElementById('editor-ui').style.display = 'flex';

                updatePageNav();
                renderThumbnails(pdf);
                loadPage(1);

            } catch (err) {
                console.error(err);
                alert('Error loading PDF: ' + err.message);
            } finally {
                hideLoading();
            }
        }

        async function renderThumbnails(pdf) {
            const container = document.getElementById('thumbsContainer');
            container.innerHTML = '';

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 0.2 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;

                const div = document.createElement('div');
                div.className = 'thumb' + (i === 1 ? ' active' : '');
                div.id = `thumb-${i}`;
                div.innerHTML = `<img src="${canvas.toDataURL()}" style="width:100%"><div class="thumb-num">${i}</div>`;
                div.onclick = () => loadPage(i);
                container.appendChild(div);
            }
        }

        async function loadPage(pageLimit) {
            showLoading('Rendering...');

            if (currentPage !== pageLimit) savePageState();

            currentPage = pageLimit;
            updatePageNav();

            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            const thumb = document.getElementById(`thumb-${currentPage}`);
            if (thumb) thumb.classList.add('active');

            const pdf = await pdfjsLib.getDocument(pdfBytes.slice(0)).promise;
            const page = await pdf.getPage(currentPage);
            const viewport = page.getViewport({ scale: currentScale });

            canvas.setWidth(viewport.width);
            canvas.setHeight(viewport.height);
            document.getElementById('canvasWrapper').style.width = viewport.width + 'px';
            document.getElementById('canvasWrapper').style.height = viewport.height + 'px';

            const renderCanvas = document.createElement('canvas');
            renderCanvas.width = viewport.width;
            renderCanvas.height = viewport.height;
            await page.render({ canvasContext: renderCanvas.getContext('2d'), viewport: viewport }).promise;

            const bgImg = new fabric.Image(renderCanvas, {
                selectable: false,
                evented: false
            });

            canvas.clear();
            canvas.setBackgroundImage(bgImg, canvas.renderAll.bind(canvas));

            if (fabricPages[currentPage]) {
                canvas.loadFromJSON(fabricPages[currentPage], () => {
                    canvas.setBackgroundImage(bgImg, canvas.renderAll.bind(canvas));
                    // Restore drawing mode if needed? No, standard is select.
                });
            }

            // Re-apply current tool
            restoreToolState();

            hideLoading();
        }

        function savePageState() {
            if (!currentPage) return;
            const json = canvas.toJSON();
            fabricPages[currentPage] = json;
        }

        function updatePageNav() {
            document.getElementById('pageIndicator').innerText = `Page ${currentPage} / ${totalPages}`;
        }

        function changePage(delta) {
            const next = currentPage + delta;
            if (next >= 1 && next <= totalPages) loadPage(next);
        }

        function changeZoom(delta) {
            const newScale = currentScale + delta;
            if (newScale < 0.5 || newScale > 3.0) return;

            currentScale = newScale;
            document.getElementById('zoomLevel').innerText = Math.round(currentScale * 100) + '%';

            // Reload page at new scale
            loadPage(currentPage);
        }

        // --- TOOLS ---
        let currentTool = 'select';

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));

            if (tool === 'select') {
                document.getElementById('btn-select').classList.add('active');
                canvas.isDrawingMode = false;
                canvas.selection = true;
                canvas.defaultCursor = 'default';
                canvas.forEachObject(o => o.selectable = true);
            } else if (tool === 'hand') {
                document.getElementById('btn-hand').classList.add('active');
                canvas.isDrawingMode = false;
                canvas.selection = false;
                canvas.defaultCursor = 'grab';
                canvas.forEachObject(o => o.selectable = false);
            } else if (tool === 'draw') {
                document.getElementById('btn-draw').classList.add('active');
                canvas.isDrawingMode = true;
                canvas.selection = false;
                canvas.freeDrawingBrush.color = "black";
                canvas.freeDrawingBrush.width = 3;
            }
        }

        function restoreToolState() {
            setTool(currentTool);
        }

        function addText() {
            setTool('select');
            const text = new fabric.IText('Your Text', {
                left: 100, top: 100,
                fontFamily: 'Helvetica',
                fill: '#000000',
                fontSize: 20
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        function addCheckmark() {
            setTool('select');
            const text = new fabric.Text('✓', {
                left: 100, top: 100,
                fontFamily: 'Arial',
                fill: '#000000',
                fontSize: 30
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        function addWhiteout() {
            setTool('select');
            const rect = new fabric.Rect({
                left: 100, top: 100,
                width: 100, height: 30,
                fill: '#ffffff',
                stroke: 'transparent'
            });
            canvas.add(rect);
            canvas.setActiveObject(rect);
        }

        function addShape(type) {
            setTool('select');
            let shape;
            if (type === 'rect') {
                shape = new fabric.Rect({
                    left: 100, top: 100, width: 100, height: 100,
                    fill: 'transparent', stroke: '#000000', strokeWidth: 2
                });
            } else if (type === 'circle') {
                shape = new fabric.Circle({
                    left: 100, top: 100, radius: 50,
                    fill: 'transparent', stroke: '#000000', strokeWidth: 2
                });
            } else if (type === 'line') {
                shape = new fabric.Line([50, 50, 200, 50], {
                    left: 100, top: 100,
                    stroke: '#000000', strokeWidth: 2
                });
            }
            canvas.add(shape);
            canvas.setActiveObject(shape);
        }

        function addImageTrigger() {
            document.getElementById('imgInput').click();
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (f) {
                const data = f.target.result;
                fabric.Image.fromURL(data, function (img) {
                    img.scaleToWidth(200);
                    canvas.add(img);
                    setTool('select');
                    canvas.setActiveObject(img);
                });
            };
            reader.readAsDataURL(file);
            e.target.value = ''; // Reset
        }

        function deleteSelected() {
            canvas.getActiveObjects().forEach(obj => canvas.remove(obj));
            canvas.discardActiveObject();
            canvas.requestRenderAll();
        }

        async function addNewPage() {
            showLoading('Adding Page...');
            try {
                const pdfDoc = await PDFDocument.load(pdfBytes);
                const page = pdfDoc.addPage(PDFDocument.create().getPage(0));

                pdfBytes = await pdfDoc.save();

                const pdf = await pdfjsLib.getDocument(pdfBytes.slice(0)).promise;
                totalPages = pdf.numPages;

                fabricPages[totalPages] = { objects: [] }; // Init new page

                await renderThumbnails(pdf);
                loadPage(totalPages);

            } catch (err) {
                console.error(err);
                alert('Failed to add page.');
            } finally {
                hideLoading();
            }
        }

        function updatePropsBar() {
            const obj = canvas.getActiveObject();
            if (!obj) return;
            const bar = document.getElementById('propsBar');
            bar.style.visibility = 'visible';
            bar.innerHTML = '';

            // Fill
            if (obj.fill && typeof obj.fill === 'string') {
                const wrapper = document.createElement('div');
                wrapper.className = 'prop-item';
                wrapper.innerHTML = `<span style="font-size:0.8rem; color:#64748b;">Fill:</span>`;
                const input = document.createElement('input');
                input.type = 'color';
                input.value = obj.fill === 'transparent' ? '#ffffff' : obj.fill;
                input.onchange = (e) => { obj.set('fill', e.target.value); canvas.renderAll(); };
                wrapper.appendChild(input);
                bar.appendChild(wrapper);
            }

            // Stroke (or color for Path)
            if (obj.stroke || obj.type === 'path') {
                const target = obj.type === 'path' ? 'stroke' : 'stroke'; // Path usually uses stroke for valid color
                const wrapper = document.createElement('div');
                wrapper.className = 'prop-item';
                wrapper.innerHTML = `<span style="font-size:0.8rem; color:#64748b;">Color:</span>`;
                const input = document.createElement('input');
                input.type = 'color';
                input.value = obj.stroke || obj.fill || '#000000';
                input.onchange = (e) => {
                    obj.set('stroke', e.target.value);
                    if (obj.type === 'path') obj.set('fill', null); // Paths are usually stroked
                    canvas.renderAll();
                };
                wrapper.appendChild(input);
                bar.appendChild(wrapper);
            }

            if (obj.type === 'i-text' || obj.type === 'text') {
                const wrapper = document.createElement('div');
                wrapper.className = 'prop-item';
                wrapper.innerHTML = `<span style="font-size:0.8rem; color:#64748b;">Size:</span>`;
                const input = document.createElement('input');
                input.type = 'number';
                input.value = obj.fontSize;
                input.style.width = '50px';
                input.style.borderRadius = '4px';
                input.style.border = '1px solid #ccc';
                input.onchange = (e) => { obj.set('fontSize', parseInt(e.target.value)); canvas.renderAll(); };
                wrapper.appendChild(input);
                bar.appendChild(wrapper);
            }
        }

        async function savePDF() {
            showLoading('Saving PDF...');
            savePageState();

            try {
                const pdfDoc = await PDFDocument.load(pdfBytes);
                const helveticaFont = await pdfDoc.embedFont(StandardFonts.Helvetica);
                const helveticaBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

                const pages = pdfDoc.getPages();

                for (let i = 1; i <= totalPages; i++) {
                    const pageData = fabricPages[i];
                    if (!pageData || !pageData.objects || pageData.objects.length === 0) continue;

                    const pdfPage = pages[i - 1];
                    const { width, height } = pdfPage.getSize();

                    const scaleFactor = 1 / currentScale;

                    for (const obj of pageData.objects) {
                        const x = obj.left * scaleFactor;
                        const y = height - (obj.top * scaleFactor);

                        if (obj.type === 'i-text' || obj.type === 'text') {
                            const textSize = obj.fontSize * scaleFactor;
                            const textHeight = obj.height * obj.scaleY * scaleFactor;
                            pdfPage.drawText(obj.text, {
                                x: x,
                                y: y - textHeight + (textSize * 0.2),
                                size: textSize,
                                font: (obj.fontWeight === 'bold') ? helveticaBold : helveticaFont,
                                color: hexToRgb(obj.fill)
                            });
                        }
                        else if (obj.type === 'rect') {
                            const w = obj.width * obj.scaleX * scaleFactor;
                            const h = obj.height * obj.scaleY * scaleFactor;
                            pdfPage.drawRectangle({
                                x: x,
                                y: y - h,
                                width: w,
                                height: h,
                                color: obj.fill === 'transparent' ? undefined : hexToRgb(obj.fill),
                                borderColor: obj.stroke === 'transparent' ? undefined : hexToRgb(obj.stroke),
                                borderWidth: obj.strokeWidth * scaleFactor
                            });
                        }
                        else if (obj.type === 'circle') {
                            const r = obj.radius * obj.scaleX * scaleFactor;
                            const centerX = x + r;
                            const centerY = y - r;
                            pdfPage.drawCircle({
                                x: centerX,
                                y: centerY,
                                size: r,
                                color: obj.fill === 'transparent' ? undefined : hexToRgb(obj.fill),
                                borderColor: obj.stroke === 'transparent' ? undefined : hexToRgb(obj.stroke),
                                borderWidth: obj.strokeWidth * scaleFactor
                            });
                        }
                        else if (obj.type === 'image') {
                            // Handle Image Embedding
                            // We need to fetch the image data from src (base64)
                            // obj.src is usually data URL
                            const imgBytes = await fetch(obj.src).then(res => res.arrayBuffer());
                            let embeddedImage;
                            if (obj.src.startsWith('data:image/png')) {
                                embeddedImage = await pdfDoc.embedPng(imgBytes);
                            } else {
                                embeddedImage = await pdfDoc.embedJpg(imgBytes);
                            }

                            const w = obj.width * obj.scaleX * scaleFactor;
                            const h = obj.height * obj.scaleY * scaleFactor;

                            pdfPage.drawImage(embeddedImage, {
                                x: x,
                                y: y - h, // Bottom-left
                                width: w,
                                height: h
                            });
                        }
                        else if (obj.type === 'path') {
                            // For signatures (paths).
                            // Easiest to convert path to Image via Canvas, then embed.
                            // Creating a temporary canvas to rasterize the path
                            const tempCanvas = document.createElement('canvas');
                            const bb = fabric.util.makeBoundingBoxFromPoints(obj.path.map(p => ({ x: p[1], y: p[2] })));
                            // Wait, fabric path logic is complex.
                            // Alternative: drawSvgPath?
                            // obj.path is array of commands. ['M', x, y], ['L', x, y]...
                            // pdf-lib drawSvgPath expects a string "M x y L x y ..."

                            // Let's try rasterization because mapping path coordinates exactly is hard with scaling.
                            // Actually, obj.toDataURL() works for single object.

                            // We need to restore the object to a separate canvas to get dataURL without background?
                            // fabric object can generate its own dataURL!
                            const imgData = obj.toDataURL();
                            const imgBytes = await fetch(imgData).then(res => res.arrayBuffer());
                            const embeddedImage = await pdfDoc.embedPng(imgBytes); // canvas toDataURL is PNG default

                            const w = obj.width * obj.scaleX * scaleFactor;
                            const h = obj.height * obj.scaleY * scaleFactor;

                            // Fabric path origin is top-left of bounding box?
                            // Yes.
                            pdfPage.drawImage(embeddedImage, {
                                x: x,
                                y: y - h,
                                width: w,
                                height: h
                            });
                        }
                    }
                }

                const modifiedBytes = await pdfDoc.save();
                download(modifiedBytes, "edited-document.pdf", "application/pdf");

            } catch (err) {
                console.error(err);
                alert('Error saving PDF: ' + err.message);
            } finally {
                hideLoading();
            }
        }

        function hexToRgb(hex) {
            if (!hex || hex === 'transparent') return undefined;
            if (hex.startsWith('#')) {
                const r = parseInt(hex.slice(1, 3), 16) / 255;
                const g = parseInt(hex.slice(3, 5), 16) / 255;
                const b = parseInt(hex.slice(5, 7), 16) / 255;
                return rgb(r, g, b);
            }
            return undefined;
        }

        // --- UTILS ---
        function showLoading(msg) {
            document.getElementById('loadingText').innerText = msg;
            document.getElementById('loadingModal').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingModal').style.display = 'none';
        }

        function closeEditor() {
            if (confirm('Exit editor? Unsaved changes will be lost.')) {
                location.reload();
            }
        }
    </script>
