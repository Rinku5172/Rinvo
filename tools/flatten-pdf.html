    <!-- Resource Hints -->

    <!-- Google Fonts -->

        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap&font-display=swap"

    <style>
        :root {
            --primary: #475569;
            --primary-dark: #334155;
            --secondary: #94a3b8;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 80px;
        }



        /* Main Content */
        main {
            flex: 1;
            padding: 4rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-container {
            max-width: 800px;
            width: 100%;
            background: var(--card);
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            padding: 3rem 2rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .tool-icon {
            width: 80px;
            height: 80px;
            background: #e2e8f0;
            color: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #475569 0%, #1e293b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desc {
            color: var(--secondary);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        /* Upload Area */
        .upload-box {
            border: 2px dashed var(--border);
            border-radius: 1rem;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: 0.3s;
            background: #f8fafc;
        }

        .upload-box:hover {
            border-color: var(--primary);
            background: #f1f5f9;
            transform: translateY(-2px);
        }

        .upload-icon-small {
            font-size: 3rem;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .btn-select {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(71, 85, 105, 0.3);
            transition: 0.2s;
        }

        .btn-select:hover {
            background: var(--primary-dark);
            box-shadow: 0 6px 16px rgba(71, 85, 105, 0.4);
        }

        /* Process Section */
        .process-section {
            display: none;
            margin-top: 2rem;
            text-align: center;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .file-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            background: #f1f5f9;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
        }

        .file-icon {
            font-size: 1.5rem;
            color: #ef4444;
        }

        .file-details h3 {
            font-size: 1rem;
            margin-bottom: 0.2rem;
        }

        .file-details p {
            font-size: 0.85rem;
            color: var(--secondary);
        }

        .action-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(71, 85, 105, 0.4);
        }

        .action-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-msg {
            margin-top: 1rem;
            text-align: center;
            font-weight: 500;
        }

        .success {
            color: #10b981;
        }

        .error {
            color: #ef4444;
        }
    </style>
    <link rel="stylesheet" href="../css/header-footer.css">
    <script src="../js/header-footer.js" defer></script>
</head>

<body>
    <div id="rocket-header"></div>

    <main>
        <div class="tool-container">
            <div class="tool-icon">
                <i class="fas fa-layer-group"></i>
            </div>
            <h1>Flatten PDF</h1>
            <p class="desc">Merge PDF layers, make forms read-only, and prevent further editing.</p>

            <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon-small">
                    <i class="fas fa-file-pdf"></i>
                </div>
                <h3>Click to upload or drag and drop</h3>
                <p style="color: #64748b; margin-top: 0.5rem;">Supported format: PDF</p>
                <button class="btn-select">Select PDF File</button>
                <input type="file" id="fileInput" accept=".pdf" style="display: none;">
            </div>

            <div class="process-section" id="processSection">
                <div class="file-info">
                    <div class="file-icon"><i class="fas fa-file-pdf"></i></div>
                    <div class="file-details">
                        <h3 id="fileName">document.pdf</h3>
                        <p id="fileSize">1.2 MB</p>
                    </div>
                </div>

                <div class="alert-box"
                    style="background: #e2e8f0; color: #475569; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; font-size: 0.9rem; text-align: left;">
                    <i class="fas fa-info-circle"></i> <strong>Note:</strong> Flattening will make all form fields
                    uneditable and merge annotations into the page content.
                </div>

                <button class="action-btn" id="flattenBtn">
                    <i class="fas fa-compress-arrows-alt"></i> Flatten PDF
                </button>

                <div class="status-msg" id="statusMsg"></div>
            </div>
        </div>
    </main>

    <div id="rocket-footer"></div>

    <script>
        const { PDFDocument } = PDFLib;
        let pFile = null;

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const processSection = document.getElementById('processSection');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const flattenBtn = document.getElementById('flattenBtn');
        const statusMsg = document.getElementById('statusMsg');

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
            dropZone.style.background = '#f1f5f9';
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.background = '#f8fafc';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.background = '#f8fafc';
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Please upload a valid PDF file.');
                return;
            }
            pFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';

            dropZone.style.display = 'none';
            processSection.style.display = 'block';
            statusMsg.textContent = '';
        }

        flattenBtn.addEventListener('click', async () => {
            flattenBtn.disabled = true;
            flattenBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            statusMsg.textContent = 'Flattening PDF...';

            try {
                const arrayBuffer = await pFile.arrayBuffer();
                const pdfDoc = await PDFDocument.load(arrayBuffer);

                // Flatten form
                const form = pdfDoc.getForm();
                try {
                    form.flatten();
                } catch (e) {
                    console.log("No form to flatten or error flattening form", e);
                }

                const pdfBytes = await pdfDoc.save();

                const newFileName = 'Flattened_' + pFile.name;
                download(pdfBytes, newFileName, "application/pdf");

                statusMsg.textContent = 'Success! Download started.';
                statusMsg.className = 'status-msg success';
                flattenBtn.innerHTML = '<i class="fas fa-check"></i> Flattened';

            } catch (error) {
                console.error(error);
                statusMsg.textContent = 'Error processing PDF: ' + error.message;
                statusMsg.className = 'status-msg error';
                flattenBtn.innerHTML = '<i class="fas fa-compress-arrows-alt"></i> Flatten PDF';
                flattenBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
