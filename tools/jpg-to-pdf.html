    <script>
        const { PDFDocument, PageSizes } = PDFLib;
        let images = []; // Stores { file, rotation, id }

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const workspace = document.getElementById('workspace');
        const imageGrid = document.getElementById('imageGrid');
        const imageCount = document.getElementById('imageCount');
        const convertBtn = document.getElementById('convertBtn');
        const statusMsg = document.getElementById('statusMsg');

        // Settings
        const orientationSelect = document.getElementById('orientationSelect');
        const pageSizeSelect = document.getElementById('pageSizeSelect');
        const marginSelect = document.getElementById('marginSelect');

        // Initialize Sortable
        new Sortable(imageGrid, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            onEnd: function (evt) {
                // Reorder images array based on DOM order
                const newImages = [];
                const cards = imageGrid.querySelectorAll('.image-card');
                cards.forEach(card => {
                    const id = card.dataset.id;
                    const img = images.find(i => i.id === id);
                    if (img) newImages.push(img);
                });
                images = newImages;
                updateBadgeNumbers();
            }
        });

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
            dropZone.style.background = 'rgba(244, 63, 94, 0.05)';
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.background = 'linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%)';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.background = 'linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%)';
            const files = e.dataTransfer.files;
            if (files.length) handleFiles(files);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFiles(e.target.files);
        });

        async function handleFiles(files) {
            const newFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            if (newFiles.length === 0) return;

            dropZone.style.display = 'none';
            workspace.classList.add('active');

            for (const file of newFiles) {
                const id = Math.random().toString(36).substr(2, 9);
                const reader = new FileReader();

                reader.onload = (e) => {
                    const imgObj = {
                        id: id,
                        file: file,
                        src: e.target.result,
                        rotation: 0
                    };
                    images.push(imgObj);
                    renderImageCard(imgObj);
                    updateCount();
                };
                reader.readAsDataURL(file);
            }
        }

        function renderImageCard(imgObj) {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.dataset.id = imgObj.id;
            card.innerHTML = `
                <div class="badge-number"></div>
                <img src="${imgObj.src}" class="image-preview">
                <div class="image-actions">
                    <button class="btn-action" title="Rotate Left" onclick="rotateImage('${imgObj.id}', -90)">
                        <i class="fas fa-undo"></i>
                    </button>
                    <button class="btn-action" title="Rotate Right" onclick="rotateImage('${imgObj.id}', 90)">
                        <i class="fas fa-redo"></i>
                    </button>
                    <button class="btn-action btn-delete" title="Remove" onclick="removeImage('${imgObj.id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;
            imageGrid.appendChild(card);
            updateBadgeNumbers();
        }

        window.rotateImage = (id, deg) => {
            const imgObj = images.find(i => i.id === id);
            if (imgObj) {
                imgObj.rotation = (imgObj.rotation + deg) % 360;
                const card = document.querySelector(`.image-card[data-id="${id}"]`);
                const preview = card.querySelector('.image-preview');
                preview.style.transform = `rotate(${imgObj.rotation}deg)`;
            }
        };

        window.removeImage = (id) => {
            images = images.filter(i => i.id !== id);
            const card = document.querySelector(`.image-card[data-id="${id}"]`);
            if (card) card.remove();
            updateCount();
            updateBadgeNumbers();

            if (images.length === 0) {
                workspace.classList.remove('active');
                dropZone.style.display = 'block';
            }
        };

        function updateCount() {
            imageCount.textContent = images.length;
        }

        function updateBadgeNumbers() {
            const cards = imageGrid.querySelectorAll('.image-card');
            cards.forEach((card, index) => {
                const badge = card.querySelector('.badge-number');
                badge.textContent = index + 1;
            });
        }

        // PDF Generation
        convertBtn.addEventListener('click', async () => {
            if (images.length === 0) return;

            convertBtn.disabled = true;
            convertBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Converting...';
            statusMsg.style.display = 'none';

            try {
                const pdfDoc = await PDFDocument.create();

                // Get Settings
                const orientation = orientationSelect.value;
                const pageSizeFunc = pageSizeSelect.value; // 'a4', 'letter', 'fit'
                const marginVal = marginSelect.value; // 'none', 'small', 'big'

                let margin = 0;
                if (marginVal === 'small') margin = 20;
                if (marginVal === 'big') margin = 50;

                for (const imgObj of images) {
                    const arrayBuffer = await imgObj.file.arrayBuffer();
                    let image;

                    try {
                        if (imgObj.file.type === 'image/jpeg') {
                            image = await pdfDoc.embedJpg(arrayBuffer);
                        } else if (imgObj.file.type === 'image/png') {
                            image = await pdfDoc.embedPng(arrayBuffer);
                        } else {
                            // Try to embed as PNG for other types if supported, 
                            // but generic fallback is risky without server conversion. 
                            // PDF-lib supports JPG and PNG.
                            // For WEBP, we might need a canvas conversion first.
                            // Let's adding a canvas fallback for non-jpg/png.

                    // Fix rotation pivot:

                const pdfBytes = await pdfDoc.save();
                download(pdfBytes, 'rocket_images.pdf', 'application/pdf');

        async function embedImageFallback(pdfDoc, dataUrl) {
            // Helper to convert dataURL to PNG bytes via canvas
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const pngUrl = canvas.toDataURL('image/png');
                    const pngBytes = await fetch(pngUrl).then(res => res.arrayBuffer());
                    const embedded = await pdfDoc.embedPng(pngBytes);
                    resolve(embedded);
                };
                img.onerror = () => resolve(null);
                img.src = dataUrl;
            });
        }
