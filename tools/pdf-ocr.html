    <!-- Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap&font-display=swap"
        rel="stylesheet">
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <!-- Tesseract.js -->
    <script src="https://unpkg.com/tesseract.js@v4.0.3/dist/tesseract.min.js"></script>
    <!-- Download JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/downloadjs/1.4.8/download.min.js"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            flex-direction: column;
            padding-top: 80px;
        }



        /* Main Content */
        main {
            flex: 1;
            padding: 4rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-container {
            max-width: 900px;
            width: 100%;
            background: var(--card);
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            padding: 3rem 2rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .tool-icon {
            width: 80px;
            height: 80px;
            background: #ede9fe;
            color: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #4c1d95 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desc {
            color: var(--secondary);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        /* Upload Area */
        .upload-box {
            border: 2px dashed var(--border);
            border-radius: 1rem;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: 0.3s;
            background: #f8fafc;
        }

        .upload-box:hover {
            border-color: var(--primary);
            background: #f5f3ff;
            transform: translateY(-2px);
        }

        .upload-icon-small {
            font-size: 3rem;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .btn-select {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
            transition: 0.2s;
        }

        .btn-select:hover {
            background: var(--primary-dark);
            box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
        }

        /* OCR Output Section */
        .process-section {
            display: none;
            margin-top: 2rem;
            text-align: left;
        }

        .textarea-container {
            width: 100%;
            margin-bottom: 1.5rem;
        }

        #ocrResult {
            width: 100%;
            height: 300px;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            resize: vertical;
        }

        .actions-row {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .action-btn {
            padding: 0.8rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        /* Progress Bar */
        .progress-container {
            display: none;
            margin-bottom: 1.5rem;
        }

        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.3s;
        }

        .status-text {
            font-size: 0.9rem;
            color: var(--secondary);
            text-align: center;
        }
    </style>
    <link rel="stylesheet" href="../css/header-footer.css">
    <script src="../js/header-footer.js" defer></script>
</head>

<body>
    <div id="rocket-header"></div>

    <main>
        <div class="tool-container">
            <div class="tool-icon">
                <i class="fas fa-eye"></i>
            </div>
            <h1>PDF OCR</h1>
            <p class="desc">Extract text from scanned PDF documents using Optical Character Recognition (OCR).</p>

            <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon-small">
                    <i class="fas fa-file-invoice"></i>
                </div>
                <h3>Upload Scanned PDF</h3>
                <p style="color: #64748b; margin-top: 0.5rem;">We'll extract the text for you</p>
                <button class="btn-select">Select PDF File</button>
                <input type="file" id="fileInput" accept=".pdf" style="display: none;">
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="status-text" id="statusText">Initializing OCR engine...</div>
            </div>

            <div class="process-section" id="processSection">
                <div class="textarea-container">
                    <label style="display:block; margin-bottom:0.5rem; font-weight:600;">Extracted Text:</label>
                    <textarea id="ocrResult" placeholder="Extracted text will appear here..."></textarea>
                </div>

                <div class="actions-row">
                    <button class="action-btn btn-secondary" onclick="copyText()">
                        <i class="fas fa-copy"></i> Copy Text
                    </button>
                    <button class="action-btn btn-primary" onclick="downloadText()">
                        <i class="fas fa-download"></i> Download .txt
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="rocket-footer"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const processSection = document.getElementById('processSection');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const ocrResult = document.getElementById('ocrResult');

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
            dropZone.style.background = '#f5f3ff';
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.background = '#f8fafc';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length) processFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) processFile(e.target.files[0]);
        });

        async function processFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Please upload a valid PDF file.');
                return;
            }

            dropZone.style.display = 'none';
            progressContainer.style.display = 'block';
            ocrResult.value = '';

            try {
                // 1. Load PDF
                statusText.textContent = 'Loading PDF...';
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                const totalPages = pdf.numPages;

                let combinedText = '';

                // 2. Iterate pages
                for (let i = 1; i <= totalPages; i++) {
                    statusText.textContent = `Processing page ${i} of ${totalPages}...`;
                    progressFill.style.width = `${((i - 1) / totalPages) * 100}%`;

                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 }); // Higher scale for better OCR

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;

                    const image = canvas.toDataURL('image/png');

                    // 3. Run OCR using Tesseract
                    const { data: { text } } = await Tesseract.recognize(image, 'eng', {
                        // logger: m => console.log(m)
                    });

                    combinedText += `--- Page ${i} ---\n${text}\n\n`;
                }

                progressFill.style.width = '100%';
                statusText.textContent = 'Done!';

                ocrResult.value = combinedText;
                progressContainer.style.display = 'none';
                processSection.style.display = 'block';

            } catch (error) {
                console.error(error);
                statusText.textContent = 'Error processing PDF: ' + error.message;
                statusText.style.color = '#ef4444';
            }
        }

        function copyText() {
            ocrResult.select();
            document.execCommand('copy');
            alert('Text copied to clipboard!');
        }

        function downloadText() {
            const text = ocrResult.value;
            download(text, 'extracted_text.txt', 'text/plain');
        }
    </script>
</body>

</html>
