    <style>
        :root {
            --primary: #9333ea;
            --primary-dark: #7e22ce;
            --secondary: #64748b;
            --bg: #faf5ff;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            display: flex;
            flex-direction: column;
            padding-top: 80px;
        }



        /* Main Content */
        main {
            flex: 1;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-container {
            max-width: 1100px;
            width: 100%;
            background: var(--card);
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            border: 1px solid var(--border);
        }

        .tool-header-content {
            text-align: center;
            margin-bottom: 2rem;
        }

        .tool-icon {
            width: 70px;
            height: 70px;
            background: #f3e8ff;
            color: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #7e22ce 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desc {
            color: var(--secondary);
            font-size: 1rem;
        }

        /* Upload Area */
        .upload-box {
            border: 2px dashed var(--border);
            border-radius: 1rem;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: 0.3s;
            background: #fdf4ff;
            text-align: center;
        }

        .upload-box:hover {
            border-color: var(--primary);
            background: #fae8ff;
            transform: translateY(-2px);
        }

        .upload-icon-small {
            font-size: 3rem;
            color: #d8b4fe;
            margin-bottom: 1rem;
        }

        .btn-select {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(147, 51, 234, 0.3);
            transition: 0.2s;
        }

        .btn-select:hover {
            background: var(--primary-dark);
            box-shadow: 0 6px 16px rgba(147, 51, 234, 0.4);
        }

        /* App Interface */
        .app-interface {
            display: none;
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        @media (max-width: 900px) {
            .app-interface {
                flex-direction: column;
            }
        }

        /* Sidebar Controls */
        .controls-sidebar {
            width: 300px;
            background: #f8fafc;
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .control-section {
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--secondary);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .signature-pad-wrapper {
            background: white;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            overflow: hidden;
        }

        canvas#signaturePad {
            width: 100%;
            height: 150px;
            display: block;
        }

        .btn-text {
            border: 1px solid var(--border);
            background: white;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--secondary);
        }

        .btn-text:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        .btn-add-sig {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-add-sig:hover {
            background: var(--primary-dark);
        }

        .btn-download {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-download:hover {
            background: #059669;
        }

        /* PDF Viewer */
        .pdf-viewer-container {
            flex: 1;
            background: #e2e8f0;
            border-radius: 1rem;
            padding: 2rem;
            overflow: auto;
            max-height: 800px;
            position: relative;
            text-align: center;
        }

        .pdf-page-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
        }

        .pdf-page-canvas {
            display: block;
            border-radius: 0.25rem;
        }

        /* Draggable Signature */
        .draggable-signature {
            position: absolute;
            cursor: move;
            border: 2px dashed #9333ea;
            background: rgba(147, 51, 234, 0.1);
            z-index: 10;
            user-select: none;
            touch-action: none;
        }

        .draggable-signature img {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .delete-sig {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            cursor: pointer;
            border: 2px solid white;
        }

        .status-msg {
            margin-top: 1rem;
            text-align: center;
            font-weight: 500;
        }

        .success {
            color: #10b981;
        }

        .error {
            color: #ef4444;
        }
    </style>

<body>
    <div id="rocket-header"></div>

    <main>
        <div class="tool-container">
            <div class="tool-header-content">
                <div class="tool-icon">
                    <i class="fas fa-signature"></i>
                </div>
                <h1>Sign PDF</h1>
                <p class="desc">Draw your signature and place it on your PDF document.</p>
            </div>

            <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon-small">
                    <i class="fas fa-file-invoice"></i>
                </div>
                <h3>Click to upload or drag and drop</h3>
                <p style="color: #64748b; margin-top: 0.5rem;">Supported format: PDF</p>
                <button class="btn-select">Select PDF File</button>
                <input type="file" id="fileInput" accept=".pdf" style="display: none;">
            </div>

            <div class="app-interface" id="appInterface" style="display: none;">
                <!-- Sidebar -->
                <div class="controls-sidebar">
                    <div class="control-section">
                        <div class="section-title">Draw Signature</div>
                        <div class="signature-pad-wrapper">
                            <canvas id="signaturePad"></canvas>
                        </div>
                        <div style="display: flex; justify-content: space-between;">
                            <button class="btn-text" onclick="clearPad()">Clear</button>
                        </div>
                        <button class="btn-add-sig" onclick="addSignature()">
                            <i class="fas fa-plus"></i> Add to PDF
                        </button>
                    </div>

                    <div class="control-section">
                        <div class="section-title">Navigation</div>
                        <div style="display: flex; gap: 0.5rem; justify-content: center; align-items: center;">
                            <button class="btn-text" onclick="changePage(-1)"><i
                                    class="fas fa-chevron-left"></i></button>
                            <span id="pageInfo" style="font-size: 0.9rem; font-weight: 600;">Page 1 of 1</span>
                            <button class="btn-text" onclick="changePage(1)"><i
                                    class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>

                    <button class="btn-download" id="downloadBtn">
                        <i class="fas fa-download"></i> Download Signed PDF
                    </button>

                    <div class="status-msg" id="statusMsg"></div>
                </div>

                <!-- Viewer -->
                <div class="pdf-viewer-container" id="pdfContainer">
                    <div class="pdf-page-container" id="pageContainer">
                        <canvas id="pdfCanvas" class="pdf-page-canvas"></canvas>
                        <!-- Signatures will be appended here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="rocket-footer"></div>

    <script>
        const { PDFDocument, rgb } = PDFLib;

        // State
        let pdfDoc = null;
        let pdfBytes = null;
        let currentPage = 1;
        let totalPages = 0;
        let pdfScale = 1.0;
        let selectedFile = null;
        let signatures = []; // { page: 1, x: 0, y: 0, width: 100, height: 50, image: dataUrl }
        let signaturePad = null;

        // DOM Elements
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const appInterface = document.getElementById('appInterface');
        const pdfCanvas = document.getElementById('pdfCanvas');
        const pageContainer = document.getElementById('pageContainer');
        const pageInfo = document.getElementById('pageInfo');
        const statusMsg = document.getElementById('statusMsg');
        const downloadBtn = document.getElementById('downloadBtn');

        // Init Signature Pad
        const canvas = document.getElementById('signaturePad');
        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            if (signaturePad) signaturePad.clear();
        }
        window.onresize = resizeCanvas;
        resizeCanvas();
        signaturePad = new SignaturePad(canvas, {
            backgroundColor: 'rgb(255, 255, 255)'
        });

        // File Handling
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#fae8ff'; });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.style.background = '#fdf4ff'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = '#fdf4ff';
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        async function handleFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Please upload a valid PDF file.');
                return;
            }
            selectedFile = file;

            try {
                pdfBytes = await file.arrayBuffer();
                const loadingTask = pdfjsLib.getDocument(pdfBytes);
                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                currentPage = 1;

                dropZone.style.display = 'none';
                appInterface.style.display = 'flex';

                renderPage(currentPage);
            } catch (error) {
                console.error(error);
                alert('Error loading PDF');
            }
        }

        async function renderPage(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1.5 });
            pdfScale = viewport.scale;

            pdfCanvas.height = viewport.height;
            pdfCanvas.width = viewport.width;

            const renderContext = {
                canvasContext: pdfCanvas.getContext('2d'),
                viewport: viewport
            };

            await page.render(renderContext).promise;
            pageInfo.textContent = `Page ${pageNum} of ${totalPages}`;

            // Re-render valid signatures for this page
            updateSignatureOverlays();
        }

        function changePage(delta) {
            const newNode = currentPage + delta;
            if (newNode >= 1 && newNode <= totalPages) {
                currentPage = newNode;
                renderPage(currentPage);
            }
        }

        function clearPad() {
            signaturePad.clear();
        }

        function addSignature() {
            if (signaturePad.isEmpty()) {
                alert('Please draw a signature first.');
                return;
            }

            const dataUrl = signaturePad.toDataURL();
            const id = 'sig-' + Date.now();

            // Add to state
            signatures.push({
                id: id,
                page: currentPage,
                x: 50, // Default pos
                y: 50,
                width: 200, // Default width
                height: 100,
                dataUrl: dataUrl
            });

            renderSignatureElement(signatures[signatures.length - 1]);
            clearPad();
        }

        function renderSignatureElement(sig) {
            const el = document.createElement('div');
            el.className = 'draggable-signature';
            el.id = sig.id;
            el.style.left = sig.x + 'px';
            el.style.top = sig.y + 'px';
            el.style.width = sig.width + 'px';
            el.style.height = sig.height + 'px';

            el.innerHTML = `
                <img src="${sig.dataUrl}">
                <div class="delete-sig" onclick="removeSignature('${sig.id}')">
                    <i class="fas fa-times"></i>
                </div>
            `;

            pageContainer.appendChild(el);

            // Make draggable using interact.js
            interact(el).draggable({
                listeners: {
                    move(event) {
                        const target = event.target;
                        const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                        const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;

                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);

                        // Update state
                        const s = signatures.find(s => s.id === target.id);
                        if (s) {
                            s.dx = x;
                            s.dy = y;
                        }
                    }
                }
            }).resizable({
                edges: { left: true, right: true, bottom: true, top: true },
                listeners: {
                    move: function (event) {
                        let { x, y } = event.target.dataset;
                        x = (parseFloat(x) || 0) + event.deltaRect.left;
                        y = (parseFloat(y) || 0) + event.deltaRect.top;

                        Object.assign(event.target.style, {
                            width: `${event.rect.width}px`,
                            height: `${event.rect.height}px`,
                            transform: `translate(${x}px, ${y}px)`
                        });

                        Object.assign(event.target.dataset, { x, y });

                        // Update state
                        const s = signatures.find(s => s.id === event.target.id);
                        if (s) {
                            s.width = event.rect.width;
                            s.height = event.rect.height;
                            s.dx = x;
                            s.dy = y;
                        }
                    }
                }
            });
        }

        window.removeSignature = (id) => {
            signatures = signatures.filter(s => s.id !== id);
            const el = document.getElementById(id);
            if (el) el.remove();
        };

        function updateSignatureOverlays() {
            // Remove existing overlays
            document.querySelectorAll('.draggable-signature').forEach(e => e.remove());

            // Add for current page
            signatures.filter(s => s.page === currentPage).forEach(s => {
                renderSignatureElement(s);
                // Restore position
                const el = document.getElementById(s.id);
                if (el && (s.dx || s.dy)) {
                    el.style.transform = `translate(${s.dx || 0}px, ${s.dy || 0}px)`;
                    el.setAttribute('data-x', s.dx || 0);
                    el.setAttribute('data-y', s.dy || 0);
                }
            });
        }

        downloadBtn.addEventListener('click', async () => {
            if (signatures.length === 0) {
                alert('No signatures added!');
                return;
            }

            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing...';
            statusMsg.textContent = 'Embedding signatures...';

            try {
                const pdfDocLib = await PDFDocument.load(pdfBytes);

                for (const sig of signatures) {
                    const pngImage = await pdfDocLib.embedPng(sig.dataUrl);
                    const page = pdfDocLib.getPages()[sig.page - 1];
                    const { width, height } = page.getSize();

                    // Simple coordinate conversion from DOM to PDF
                    // Assuming centered view and strict scaling
                    // We need to calculate PDF coords based on viewer scale

                    // Get viewer dimensions
                    const viewerWidth = pdfCanvas.width;
                    const viewerHeight = pdfCanvas.height;

                    const scaleX = width / viewerWidth;
                    const scaleY = height / viewerHeight;

                    // Element position (including transform)
                    const el = document.getElementById(sig.id);
                    // If element is not in DOM (different page), we use stored values
                    // But we iterate ALL signatures. 
                    // So we must rely on stored 'x', 'y' plus 'dx', 'dy'

                    let finalX = sig.x + (sig.dx || 0);
                    let finalY = sig.y + (sig.dy || 0);
                    let finalW = sig.width;
                    let finalH = sig.height;

                    // Convert to PDF coords
                    // PDF coordinate system starts at bottom-left
                    // DOM starts at top-left

                    const pdfX = finalX * scaleX;
                    const pdfY = height - ((finalY + finalH) * scaleY); // Bottom-left Y of image
                    const pdfW = finalW * scaleX;
                    const pdfH = finalH * scaleY;

                    page.drawImage(pngImage, {
                        x: pdfX,
                        y: pdfY,
                        width: pdfW,
                        height: pdfH,
                    });
                }

                const pdfBytesSigned = await pdfDocLib.save();
                download(pdfBytesSigned, 'signed_' + selectedFile.name, 'application/pdf');

                statusMsg.textContent = 'Success! Download started.';
                statusMsg.className = 'status-msg success';

            } catch (error) {
                console.error(error);
                statusMsg.textContent = 'Error: ' + error.message;
                statusMsg.className = 'status-msg error';
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="fas fa-download"></i> Download Signed PDF';
            }
        });
    </script>
</body>
