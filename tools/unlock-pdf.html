    <style>
        :root {

        /* Upload Area */

        .upload-btn {

            border-radius: 50px;
            font-weight: 600;

            margin-top: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(67, 97, 238, 0.4);
        }

        /* Processing State */
        .process-container {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);

        .file-card {
            background: var(--light);

        .file-icon-small {

        .toggle-password {

        .action-btn {

<body>
    <div id="rocket-header"></div>

    <main>
        <div class="tool-container">
            <div class="tool-header">
                <div class="tool-icon">
                    <i class="fas fa-unlock-alt"></i>
                </div>
                <h1>Unlock PDF</h1>
                <p class="description">Remove password security from your PDF files instantly. Safe, secure, and
                    client-side.</p>
            </div>

            <!-- Upload State -->
            <div id="uploadInit" class="upload-area">
                <div class="upload-content">
                    <i class="fas fa-file-shield"></i>
                    <h3>Drop your PDF here</h3>
                    <p style="color: var(--secondary); margin: 0.5rem 0 1.5rem;">or click to browse</p>
                    <button class="upload-btn">Select PDF File</button>
                    <input type="file" id="fileInput" accept="application/pdf" style="display: none">
                </div>
            </div>

            <!-- Process State -->
            <div id="processState" class="process-container">
                <div class="file-card">
                    <div class="file-icon-small">
                        <i class="fas fa-file-pdf"></i>
                    </div>
                    <div class="file-info">
                        <div class="file-name" id="fileName">document.pdf</div>
                        <div class="file-meta" id="fileSize">2.4 MB</div>
                    </div>
                    <div class="file-status" id="fileStatus">
                        <i class="fas fa-lock" style="color: var(--danger)"></i>
                    </div>
                </div>

                <div id="passwordSection">
                    <div class="password-group">
                        <label>Enter Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="passwordInput" class="password-input"
                                placeholder="Type the original password...">
                            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                        </div>
                    </div>

                    <button class="action-btn" id="unlockBtn">
                        <i class="fas fa-unlock"></i> Unlock PDF
                    </button>
                </div>

                <div id="downloadSection" style="display: none;">
                    <div class="status-message success" style="margin-bottom: 2rem;">
                        <i class="fas fa-check-circle"></i> Password removed successfully!
                    </div>
                    <button class="action-btn" id="downloadBtn" style="background: var(--success);">
                        <i class="fas fa-download"></i> Download Unlocked PDF
                    </button>
                </div>

                <div id="statusMessage" class="status-message"></div>

                <button class="reset-btn" id="resetBtn">Unlock another file</button>
            </div>
        </div>
    </main>

    <div id="rocket-footer"></div>

    <script>
        const { PDFDocument } = PDFLib;

        // DOM Elements
        const dropZone = document.getElementById('uploadInit');
        const fileInput = document.getElementById('fileInput');
        const processState = document.getElementById('processState');
        const fileNameEl = document.getElementById('fileName');
        const fileSizeEl = document.getElementById('fileSize');
        const unlockBtn = document.getElementById('unlockBtn');
        const passwordInput = document.getElementById('passwordInput');
        const statusMessage = document.getElementById('statusMessage');
        const resetBtn = document.getElementById('resetBtn');
        const togglePassword = document.getElementById('togglePassword');
        const downloadSection = document.getElementById('downloadSection');
        const passwordSection = document.getElementById('passwordSection');
        const downloadBtn = document.getElementById('downloadBtn');

        let currentFile = null;
        let unlockedBytes = null;

        // Initialize
        dropZone.addEventListener('click', () => fileInput.click());

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-active');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-active');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (file.type !== 'application/pdf') {
                showError('Please select a valid PDF file.');
                return;
            }

            currentFile = file;
            fileNameEl.textContent = file.name;
            fileSizeEl.textContent = formatBytes(file.size);

            // Switch UI
            dropZone.style.display = 'none';
            processState.style.display = 'block';
            statusMessage.style.display = 'none';

            // Initial check: Is it correctly encrypted?
            try {
                const buffer = await file.arrayBuffer();
                // Try to load without password
                await PDFDocument.load(buffer);

                // If we reach here, it's NOT encrypted
                passwordSection.style.display = 'none';
                statusMessage.className = 'status-message success';
                statusMessage.innerHTML = '<i class="fas fa-info-circle"></i> This PDF is not password protected.';
                statusMessage.style.display = 'block';
                downloadSection.style.display = 'none'; // Nothing to download really, or just offer same file?

                // Optional: Offer download anyway
                unlockedBytes = buffer;
                downloadSection.style.display = 'block';
                document.querySelector('#downloadSection .status-message').innerHTML = '<i class="fas fa-info-circle"></i> No password found. Ready to download.';

            } catch (e) {
                // If error is about password, show input
                if (e.message.includes('Password')) {
                    passwordSection.style.display = 'block';
                    downloadSection.style.display = 'none';
                    passwordInput.focus();
                } else {
                    console.error(e);
                    showError('Error reading PDF file. It might be corrupted.');
                }
            }
        }

        // Toggle Password Visibility
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.className = `fas fa-${type === 'password' ? 'eye' : 'eye-slash'} toggle-password`;
        });

        // Unlock Logic
        unlockBtn.addEventListener('click', async () => {
            const password = passwordInput.value;
            if (!password) {
                showError('Please enter the password.');
                return;
            }

            setLoading(true);
            statusMessage.style.display = 'none';

            try {
                const buffer = await currentFile.arrayBuffer();

                // Attempt Load with Password
                const pdfDoc = await PDFDocument.load(buffer, { password });

                // Save without encryption
                unlockedBytes = await pdfDoc.save();

                // Success UI
                passwordSection.style.display = 'none';
                downloadSection.style.display = 'block';
                setLoading(false);

            } catch (error) {
                setLoading(false);
                if (error.message.includes('PasswordCorrect') || error.message.includes('Password')) {
                    showError('Incorrect password. Please try again.');
                } else {
                    console.error(error);
                    showError('Failed to unlock PDF. Please checks the console.');
                }
            }
        });

        // Download
        downloadBtn.addEventListener('click', () => {
            if (unlockedBytes) {
                download(unlockedBytes, `unlocked_${currentFile.name}`, "application/pdf");
            }
        });

        // Reset
        resetBtn.addEventListener('click', () => {
            currentFile = null;
            unlockedBytes = null;
            fileInput.value = '';
            passwordInput.value = '';
            dropZone.style.display = 'block';
            processState.style.display = 'none';
            passwordSection.style.display = 'block';
            downloadSection.style.display = 'none';
        });

        // Utilities
        function showError(msg) {
            statusMessage.className = 'status-message error';
            statusMessage.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;
            statusMessage.style.display = 'block';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                unlockBtn.disabled = true;
                unlockBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Unlocking...';
            } else {
                unlockBtn.disabled = false;
                unlockBtn.innerHTML = '<i class="fas fa-unlock"></i> Unlock PDF';
            }
        }

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }
    </script>
</body>
